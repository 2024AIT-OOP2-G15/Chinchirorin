<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チンチロリン</title>
    <script src="{{ url_for('static', filename='scripts/game.js') }}"></script>
</head>
<body>
    <header>
        <h1>チンチロリン</h1>
    </header>
    
    <main>
        <div style="display: flex;">
            <div>
                <h2>ここはプレイ画面です。</h2>
                <div>プレイヤー：{{name}}</div>

                <div>
                    <span id="turn"></span>
                    のターン
                </div>

                <div>
                    判定：
                    <span id="hantei"></span>
                </div>
                
                <br>
                <div onclick=roll() id="number">
                    クリックしてください。
                </div>
                <br>
                
                <a href="{{ url_for('index') }}">タイトルに戻る</a>
                <br>
                <a href="{{ url_for('result.index') }}">結果画面</a>
            </div>
            <img src="{{ url_for('static', filename='images/yaku.png')}}" alt="">
        </div>
    </main>
</body>
</html>
